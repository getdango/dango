  - file: dango/cli/main.py
    lines: 3927
    category: refactor
    task: TASK-005
    reason: "Monolithic CLI entry point; will be split into cli/commands/ submodules"
    review_by: "v1.0"

  - file: dango/web/app.py
    lines: 2900
    category: refactor
    task: TASK-085
    reason: "Monolithic web server; will be split into web/routes/ submodules"
    review_by: "v1.0"

