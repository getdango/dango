name: Question
description: Ask a question about using Dango
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question about Dango? Ask here, or check the [documentation](https://docs.getdango.dev) first.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What I've Tried
      description: Any steps you've already taken or docs you've read?

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - N/A

  - type: input
    id: dango-version
    attributes:
      label: Dango Version
      description: Output of `dango --version` (if applicable)
