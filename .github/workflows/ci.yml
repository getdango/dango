name: CI

on:
  push:
    branches: [v1, main]
  pull_request:
    branches: [v1, main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - name: ruff check
        run: ruff check .
      - name: ruff format check
        run: ruff format --check .

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    # TODO: Remove continue-on-error after mypy compliance pass
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: mypy
        run: mypy dango/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: pytest
        run: pytest --tb=short -q

  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: pip-audit
        run: pip-audit

  llm-checks:
    name: LLM checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml

      - name: File sizes
        run: python3 scripts/check_file_sizes.py --all

      - name: CLAUDE.md structure
        continue-on-error: true
        run: python3 scripts/validate_claude_md.py --recursive

      - name: File headers
        run: python3 scripts/validate_headers.py --all

      - name: Docstring coverage
        run: python3 scripts/check_docstrings.py --all

      - name: Orphan files
        continue-on-error: true
        run: python3 scripts/check_orphan_files.py

      - name: Pinned deps
        continue-on-error: true
        run: python3 scripts/check_pinned_deps.py
